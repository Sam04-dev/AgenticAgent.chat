name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify:
    name: Build, Spec & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci

      - name: Spec Immutability Check
        run: |
          npm run generate:types
          git diff --exit-code || (echo "Specs do not match generated types! Please run 'npm run generate:types' locally and commit the result." && exit 1)

      - name: Compile Contracts
        run: npm run compile

      - name: Type Safety & Lint
        run: npx tsc --noEmit

      - name: Run Integration Tests
        run: npm run test
        env:
          GOOGLE_GENAI_API_KEY: 'mock-key'
          AGENT_PRIVATE_KEY: '0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80'
          KRAKEN_API_KEY: 'mock-key'
          KRAKEN_SECRET: 'mock-secret'
          INFURA_KEY: 'mock-key'
          LUNARCRUSH_KEY: 'mock-key'
          STRYKR_PRISM_API: 'mock-key'
          NETWORK: 'sepolia'
          NODE_ENV: 'test'

      - name: Install SDK dependencies
        run: npm --prefix packages/sentinel-sdk ci

      - name: Build SDK
        run: npm --prefix packages/sentinel-sdk run build

      - name: Run SDK smoke test
        run: npm --prefix packages/sentinel-sdk run smoke

      - name: Final Documentation Sync
        run: |
          echo "Ensuring docs/guides updated in repository"
          git --no-pager status --porcelain || true
          git --no-pager add docs/guides || true
          git --no-pager diff --staged --name-only || true
          echo "Docs sync step complete"
